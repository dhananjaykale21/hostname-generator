<body>

<div class="container">

    <div class="title-row">
        <img src="henkel-logo.png" class="small-logo">

        <div>
            <h1>Henkel Hostname Generator</h1>
            <p class="subtitle">
                Generate compliant hostnames instantly using Henkel naming standards
            </p>
        </div>
    </div>

    <div class="preview-box">
        <h3>Live Preview</h3>
        <div id="preview">deazsvmwel101</div>
    </div>

    <label>Region</label>
    <select id="region" onchange="updatePreview()">
        <option value="de">Germany (de)</option>
        <option value="us">United States (us)</option>
        <option value="ap">Asia Pacific (ap)</option>
    </select>

    <label>Platform</label>
    <select id="platform" onchange="updatePreview()">
        <option value="az">Microsoft Azure (az)</option>
        <option value="gcp">Google Cloud Platform (gcp)</option>
        <option value="pvc">Private Cloud (pvc)</option>
    </select>

    <label>Resource Type</label>
    <select id="resource" onchange="updatePreview()">
        <option value="sv">Server (sv)</option>
        <option value="ws">Workstation (ws)</option>
        <option value="cl">Cluster (cl)</option>
        <option value="lb">Load Balancer (lb)</option>
        <option value="vi">Virtual Instance (vi)</option>
    </select>

    <label>Purpose</label>
    <select id="purpose" onchange="updatePreview()">
        <option value="m">Management (m)</option>
        <option value="n">Network (n)</option>
        <option value="s">Shared (s)</option>
        <option value="i">Integration (i)</option>
        <option value="b">Business (b)</option>
    </select>

    <label>Project Name (3 Characters)</label>
    <input type="text" id="project" maxlength="3" onkeyup="updatePreview()">

    <label>Environment</label>
    <select id="environment" onchange="updatePreview()">
        <option value="1">Development (1)</option>
        <option value="3">Testing (3)</option>
        <option value="5">Acceptance (5)</option>
        <option value="7">Pre-Production (7)</option>
        <option value="9">Production (9)</option>
    </select>

    <label>Number</label>
    <input type="number" id="number" value="1" min="1" max="99" onkeyup="updatePreview()">

    <button onclick="generateHostname()">
        Generate Hostname
    </button>

    <button onclick="copyHostname()">
        📋 Copy Hostname
    </button>

</div>
</body>
