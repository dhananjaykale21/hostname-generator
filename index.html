<!DOCTYPE html>
<html>
<head>
    <title>Henkel Hostname Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🏢 Henkel Hostname Generator</h1>

    <label>Region</label>
    <select id="region">
        <option>de</option>
        <option>us</option>
        <option>ap</option>
    </select>

    <label>Platform</label>
    <select id="platform">
        <option>az</option>
        <option>gcp</option>
        <option>pvc</option>
    </select>

    <label>Resource Type</label>
    <select id="resource">
        <option>sv</option>
        <option>ws</option>
        <option>cl</option>
        <option>lb</option>
        <option>vi</option>
    </select>

    <label>Purpose</label>
    <select id="purpose">
        <option>m</option>
        <option>n</option>
        <option>s</option>
        <option>i</option>
        <option>b</option>
    </select>

    <label>Project Name (3 chars)</label>
    <input type="text" id="project" maxlength="3">

    <label>Environment</label>
    <select id="environment">
        <option>1</option>
        <option>3</option>
        <option>5</option>
        <option>7</option>
        <option>9</option>
    </select>

    <label>Number</label>
    <input type="number" id="number" value="1">

    <button onclick="generateHostname()">Generate</button>

    <h2 id="result"></h2>

    <button onclick="copyHostname()">📋 Copy</button>
    <button onclick="exportCSV()">📥 Export CSV</button>
    <button onclick="toggleDarkMode()">🌙 Dark Mode</button>

    <h3>History</h3>
    <ul id="history"></ul>
</div>

<script src="script.js"></script>

</body>
</html>
